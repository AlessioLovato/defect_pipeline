demo_orchestrator:
  ros__parameters:
    homing_service: /xbotcore/homing/switch
    omnisteering_service: /xbotcore/omnisteering/switch
    ros_ctrl_service: /xbotcore/ros_ctrl/switch
    inter_switch_delay_sec: 10.0
