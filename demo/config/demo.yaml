    defect_capture_wait_after_quartet_sec: 0.5
    defect_use_mock_camera_selection: true
    defect_mock_camera_set_parameters_service: /mock_realsense/set_parameters
    defect_snapshot_image_ids:
      - wall_05_right_img_0005
      - wall_05_right_img_0008
    post_snapshot_2_reach_enabled: true
    post_snapshot_2_switch_mux_to_raw: true
    post_snapshot_2_set_ros_ctrl_false: true
    post_snapshot_2_call_homing: true
